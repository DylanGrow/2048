<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>2048: Chaos Mechanics</title>
  <style>
    :root { 
      --bg: #121212; --grid: #2c2c2c; --size: 70px; --gap: 8px; --rad: 8px;
    }
    body { 
      margin: 0; font-family: system-ui; background: var(--bg); 
      color: #fff; display: flex; flex-direction: column; align-items: center; 
      padding-top: 2vh; touch-action: none; overflow: hidden;
    }
    .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 400px;}
    button, select { background: #444; color: #fff; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    
    #game-wrapper {
      position: relative; transition: transform 0.1s;
    }
    .shake { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
    @keyframes shake {
      10%, 90% { transform: translate3d(-2px, 0, 0); }
      20%, 80% { transform: translate3d(4px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
      40%, 60% { transform: translate3d(8px, 0, 0); }
    }

    #board { 
      position: relative; background: var(--grid); padding: var(--gap); 
      border-radius: 12px; box-sizing: border-box;
    }
    .bg-cell {
      position: absolute; width: var(--size); height: var(--size); 
      background: #3d3d3d; border-radius: var(--rad);
    }
    
    .tile { 
      position: absolute; width: var(--size); height: var(--size); 
      border-radius: var(--rad); display: flex; justify-content: center; align-items: center; 
      font-size: 1.5rem; font-weight: bold; transition: transform 150ms ease; 
      z-index: 2;
    }

    /* Core Colors */
    .val-2 { background: #eee4da; color: #000; } 
    .val-4 { background: #ede0c8; color: #000; }
    .val-8 { background: #f2b179; } .val-16 { background: #f59563; }
    .val-32 { background: #f67c5f; } .val-64 { background: #f65e3b; }
    .val-128 { background: #e53935; box-shadow: 0 0 15px rgba(229,57,53,0.4); }
    
    /* Special Tiles */
    .val-R { background: #555; color: #222; border: 2px solid #333; }
    .val-W { background: linear-gradient(45deg, #ff00cc, #3333ff); box-shadow: 0 0 10px #ff00cc; }
    .val-anti { background: #000; border: 2px dashed #ff0044; color: #ff0044; }

  </style>
</head>
<body>

  <div class="toolbar">
    <select id="grid-size" onchange="changeSize()">
      <option value="3">3x3 Grid</option>
      <option value="4" selected>4x4 Grid</option>
      <option value="5">5x5 Grid</option>
    </select>
    <button onclick="toggleChaos()" id="chaos-btn">Chaos: OFF</button>
    <button onclick="restart()">Restart</button>
  </div>

  <div id="game-wrapper">
    <div id="board"></div>
  </div>

  <script>
    let size = 4;
    let chaosMode = false;
    let grid = [];
    let tileIdCounter = 0;
    const boardEl = document.getElementById('board');
    const wrapperEl = document.getElementById('game-wrapper');

    function changeSize() {
      size = parseInt(document.getElementById('grid-size').value);
      restart();
    }

    function toggleChaos() {
      chaosMode = !chaosMode;
      document.getElementById('chaos-btn').innerText = `Chaos: ${chaosMode ? 'ON' : 'OFF'}`;
      document.getElementById('chaos-btn').style.background = chaosMode ? '#e53935' : '#444';
    }

    function getPos(x) { return `calc(${x} * (var(--size) + var(--gap)) + var(--gap))`; }

    function initBoard() {
      boardEl.innerHTML = '';
      let boardSize = `calc(${size} * var(--size) + ${size + 1} * var(--gap))`;
      boardEl.style.width = boardSize;
      boardEl.style.height = boardSize;

      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          let bg = document.createElement('div');
          bg.className = 'bg-cell';
          bg.style.transform = `translate(${getPos(c)}, ${getPos(r)})`;
          boardEl.appendChild(bg);
        }
      }
    }

    function spawn() {
      let empty = [];
      for(let r=0; r<size; r++) for(let c=0; c<size; c++) {
        if(!grid.find(t => t.r === r && t.c === c)) empty.push({r,c});
      }
      if(!empty.length) return;
      
      let {r,c} = empty[Math.floor(Math.random() * empty.length)];
      let val = Math.random() > 0.1 ? 2 : 4;
      
      if (chaosMode) {
        let chance = Math.random();
        if (chance < 0.05) val = 'R'; // Rock
        else if (chance < 0.10) val = 'W'; // Wildcard
        else if (chance < 0.15) val = -2; // Antimatter
      }

      grid.push({ r, c, val, id: tileIdCounter++ });
    }

    function render() {
      document.querySelectorAll('.tile').forEach(el => el.remove());
      grid.forEach(t => {
        let el = document.createElement('div');
        let cssVal = t.val;
        if (t.val === 'R') el.innerText = '🪨';
        else if (t.val === 'W') { el.innerText = '★'; cssVal = 'W'; }
        else if (t.val < 0) { el.innerText = t.val; cssVal = 'anti'; }
        else { el.innerText = t.val; }

        el.className = `tile val-${cssVal}`;
        el.style.transform = `translate(${getPos(t.c)}, ${getPos(t.r)})`;
        el.id = `t${t.id}`;
        boardEl.appendChild(el);
      });
    }

    function slideSegment(seg) {
      let arr = seg.filter(v => v !== 0);
      let newSeg = [];
      let i = 0;
      let shook = false;

      while (i < arr.length) {
        if (i === arr.length - 1) {
          newSeg.push(arr[i]); i++;
        } 
        // Antimatter Annihilation
        else if (typeof arr[i].val === 'number' && typeof arr[i+1].val === 'number' && arr[i].val === -arr[i+1].val) {
          i += 2; // Both destroyed
        }
        // Wildcard Merge
        else if (arr[i].val === 'W' && typeof arr[i+1].val === 'number' && arr[i+1].val > 0) {
          newSeg.push({ ...arr[i], val: arr[i+1].val * 2 }); i += 2; shook = true;
        }
        else if (typeof arr[i].val === 'number' && arr[i].val > 0 && arr[i+1].val === 'W') {
          newSeg.push({ ...arr[i], val: arr[i].val * 2 }); i += 2; shook = true;
        }
        // Normal Merge
        else if (arr[i].val === arr[i+1].val && arr[i].val !== 'W' && arr[i].val !== 'R') {
          newSeg.push({ ...arr[i], val: arr[i].val * 2 });
          if (arr[i].val * 2 >= 128) shook = true;
          i += 2;
        } 
        else {
          newSeg.push(arr[i]); i++;
        }
      }

      if (shook) {
        wrapperEl.classList.remove('shake');
        void wrapperEl.offsetWidth; 
        wrapperEl.classList.add('shake');
      }

      while (newSeg.length < seg.length) newSeg.push(0);
      return newSeg;
    }

    function processLines(dir) {
      let moved = false;
      let newGrid = [];

      for (let i = 0; i < size; i++) {
        let line = grid.filter(t => dir === 'up' || dir === 'down' ? t.c === i : t.r === i);
        line.sort((a, b) => {
          let posA = dir === 'up' || dir === 'down' ? a.r : a.c;
          let posB = dir === 'up' || dir === 'down' ? b.r : b.c;
          return (dir === 'up' || dir === 'left') ? posA - posB : posB - posA;
        });

        // Fill with zeros for empty spots
        let fullLine = Array(size).fill(0);
        line.forEach(t => {
          let pos = dir === 'up' || dir === 'down' ? t.r : t.c;
          let idx = (dir === 'up' || dir === 'left') ? pos : (size - 1 - pos);
          fullLine[idx] = t;
        });

        // Split by rocks
        let resultLine = [];
        let currentSeg = [];
        for (let t of fullLine) {
          if (t !== 0 && t.val === 'R') {
            resultLine = resultLine.concat(slideSegment(currentSeg));
            resultLine.push(t);
            currentSeg = [];
          } else {
            currentSeg.push(t);
          }
        }
        resultLine = resultLine.concat(slideSegment(currentSeg));

        // Update coordinates
        for (let j = 0; j < size; j++) {
          let t = resultLine[j];
          if (t !== 0) {
            let originalPos = dir === 'up' || dir === 'down' ? t.r : t.c;
            let newPos = (dir === 'up' || dir === 'left') ? j : (size - 1 - j);
            
            if (originalPos !== newPos) moved = true;
            
            if (dir === 'up' || dir === 'down') t.r = newPos; else t.c = newPos;
            newGrid.push(t);
          }
        }
      }

      if (moved || grid.length !== newGrid.length) {
        grid = newGrid;
        spawn();
        render();
      }
    }

    function restart() {
      grid = []; initBoard(); spawn(); spawn(); render();
    }

    document.addEventListener('keydown', e => {
      let map = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right' };
      if (map[e.key]) { e.preventDefault(); processLines(map[e.key]); }
    });

    let tx, ty;
    document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, {passive:false});
    document.addEventListener('touchend', e => {
      if (!tx || !ty) return;
      let dx = e.changedTouches[0].clientX - tx, dy = e.changedTouches[0].clientY - ty;
      if (Math.max(Math.abs(dx), Math.abs(dy)) > 30) {
        if (Math.abs(dx) > Math.abs(dy)) processLines(dx > 0 ? 'right' : 'left'); 
        else processLines(dy > 0 ? 'down' : 'up');
      }
      tx = null; ty = null;
    });

    restart();
  </script>
</body>
</html>
