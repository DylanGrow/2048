<!DOCTYPE html>
<html lang="en" data-theme="dark" data-skin="cyber">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>2048 Elite</title>
<style>
  :root[data-theme="dark"] { --bg: #0b0f1a; --panel: #161b22; --grid: #21262d; --text: #c9d1d9; --accent: #58a6ff; --err: #f85149; }
  
  /* Skin: Cyber (Neon) */
  [data-skin="cyber"] .tile { border: 1px solid var(--accent); box-shadow: 0 0 15px var(--accent); }
  [data-skin="cyber"] .v-2 { background: rgba(88, 166, 255, 0.1); color: #fff; }
  [data-skin="cyber"] .v-2048 { background: #ff00ff; box-shadow: 0 0 30px #ff00ff; color: #fff; }

  /* Skin: Wood (Organic) */
  [data-skin="wood"] { --bg: #3e2723; --panel: #4e342e; --grid: #5d4037; --accent: #8d6e63; }
  [data-skin="wood"] .tile { border-radius: 50%; background: #a1887f; color: #3e2723; border: 4px solid #3e2723; }

  /* Skin: Retro (8-bit) */
  [data-skin="retro"] .tile { image-rendering: pixelated; border: 4px solid #000; border-radius: 0; font-family: 'Courier New', monospace; }

  * { box-sizing: border-box; touch-action: none; user-select: none; }
  body { margin: 0; padding: 20px; font-family: 'Inter', system-ui; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

  #app { display: grid; grid-template-columns: 320px 1fr; gap: 40px; max-width: 1100px; width: 100%; }
  @media (max-width: 900px) { #app { grid-template-columns: 1fr; } }

  .side-panel { display: flex; flex-direction: column; gap: 20px; }
  .card { background: var(--panel); padding: 20px; border-radius: 12px; border: 1px solid var(--grid); }
  
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-item { background: var(--bg); padding: 10px; border-radius: 8px; text-align: center; }
  .stat-item label { display: block; font-size: 0.7rem; text-transform: uppercase; opacity: 0.6; }
  .stat-item span { font-size: 1.2rem; font-weight: bold; }

  #game-container { position: relative; width: 500px; height: 500px; background: var(--grid); padding: 10px; border-radius: 12px; }
  @media (max-width: 600px) { #game-container { width: 90vw; height: 90vw; } }
  
  .grid-bg { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; height: 100%; }
  .cell { background: rgba(0,0,0,0.2); border-radius: 8px; }

  .tile { position: absolute; width: calc(25% - 12.5px); height: calc(25% - 12.5px); display: flex; justify-content: center; align-items: center; font-size: 2rem; font-weight: 900; transition: transform 100ms ease-in-out; border-radius: 8px; }
  .ghost-tile { opacity: 0.2; border: 2px dashed var(--accent); background: none !important; color: transparent !important; z-index: 1; }
  
  button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: var(--accent); color: #fff; margin-top: 10px; }
  select { width: 100%; padding: 12px; background: var(--grid); color: var(--text); border: 1px solid var(--accent); border-radius: 8px; margin-top: 10px; }

  #achievements { max-height: 200px; overflow-y: auto; font-size: 0.8rem; }
  .achievement { padding: 5px; border-bottom: 1px solid var(--grid); display: flex; justify-content: space-between; }
  .unlocked { color: #44ff44; }

  .v-2{background:#eee4da;color:#000}.v-4{background:#ede0c8;color:#000}.v-8{background:#f2b179;color:#fff}.v-16{background:#f59563;color:#fff}.v-32{background:#f67c5f;color:#fff}.v-64{background:#f65e3b;color:#fff}.v-128{background:#edcf72;color:#000}.v-256{background:#edcc61;color:#000}.v-512{background:#edc850;color:#fff}.v-1024{background:#edc53f;color:#fff}.v-2048{background:#edc22e;color:#fff}
</style>
</head>
<body>

<div id="app">
  <div class="side-panel">
    <div class="card">
      <div class="stat-grid">
        <div class="stat-item"><label>Score</label><span id="score">0</span></div>
        <div class="stat-item"><label>Best</label><span id="best">0</span></div>
        <div class="stat-item"><label>Moves</label><span id="moves">0</span></div>
        <div class="stat-item"><label>Rank</label><span id="rank">Novice</span></div>
      </div>
      <select id="skin-select" onchange="changeSkin()">
        <option value="cyber">Cyber Neon</option>
        <option value="wood">Rustic Wood</option>
        <option value="retro">8-Bit Retro</option>
      </select>
      <button onclick="restart()">New Game</button>
      <button onclick="undo()" id="undo-btn">Undo (3)</button>
    </div>

    <div class="card">
      <label style="font-size: 0.8rem; font-weight: bold; color: var(--accent);">🏆 Achievements</label>
      <div id="achievements"></div>
    </div>
  </div>

  <div id="game-container">
    <div class="grid-bg">
      <script>for(let i=0;i<16;i++) document.write('<div class="cell"></div>');</script>
    </div>
    <div id="tiles-layer"></div>
  </div>
</div>

<script>
  let grid = Array(16).fill(0), score = 0, moves = 0, tileId = 0, bestScore = localStorage.getItem('2048-elite-best') || 0;
  let history = [], undos = 3, ghostData = JSON.parse(localStorage.getItem('2048-ghost-run')) || null;
  const achievements = JSON.parse(localStorage.getItem('2048-achievements')) || {};

  function changeSkin() {
    document.documentElement.setAttribute('data-skin', document.getElementById('skin-select').value);
  }

  function saveGhost() {
    if (score >= bestScore) {
      localStorage.setItem('2048-ghost-run', JSON.stringify({ moves: moves, score: score, sequence: history.map(h => h.grid) }));
    }
  }

  function checkAchievements() {
    const list = document.getElementById('achievements');
    const goals = { 
      'First Merge': score > 0, 
      'Century': score >= 100, 
      'Tactician': moves > 50, 
      'Elite': grid.includes(1024), 
      'God': grid.includes(2048) 
    };
    list.innerHTML = '';
    for (let [name, met] of Object.entries(goals)) {
      if (met) achievements[name] = true;
      list.innerHTML += `<div class="achievement ${achievements[name] ? 'unlocked' : ''}"><span>${name}</span> <span>${achievements[name] ? '✓' : '×'}</span></div>`;
    }
    localStorage.setItem('2048-achievements', JSON.stringify(achievements));
  }

  function getPos(idx) {
    let x = idx % 4, y = Math.floor(idx / 4);
    return `translate(calc(${x * 100}% + ${x * 10}px), calc(${y * 100}% + ${y * 10}px))`;
  }

  function updateDOM() {
    const layer = document.getElementById('tiles-layer');
    layer.innerHTML = '';
    
    // Ghost Logic: Show where your high score was at this move count
    if (ghostData && ghostData.sequence[moves]) {
      ghostData.sequence[moves].forEach((val, i) => {
        if (val > 0) {
          let ghost = document.createElement('div');
          ghost.className = 'tile ghost-tile';
          ghost.style.transform = getPos(i);
          layer.appendChild(ghost);
        }
      });
    }

    grid.forEach((val, i) => {
      if (val > 0) {
        let t = document.createElement('div');
        t.className = `tile v-${val > 2048 ? 2048 : val}`;
        t.innerText = val;
        t.style.transform = getPos(i);
        layer.appendChild(t);
      }
    });

    document.getElementById('score').innerText = score;
    document.getElementById('moves').innerText = moves;
    document.getElementById('best').innerText = bestScore;
    document.getElementById('rank').innerText = score > 5000 ? 'Master' : score > 1000 ? 'Pro' : 'Novice';
    checkAchievements();
  }

  function spawn() {
    let empty = grid.map((v, i) => v === 0 ? i : -1).filter(i => i !== -1);
    if (empty.length) grid[empty[Math.floor(Math.random() * empty.length)]] = Math.random() > 0.1 ? 2 : 4;
  }

  function move(dir) {
    let oldGrid = [...grid], oldScore = score, moved = false;
    history.push({ grid: oldGrid, score: oldScore });

    for (let i = 0; i < 4; i++) {
      let row = [];
      for (let j = 0; j < 4; j++) {
        let idx = dir === 'L' ? i*4+j : dir === 'R' ? i*4+(3-j) : dir === 'U' ? j*4+i : (3-j)*4+i;
        if (grid[idx]) row.push(grid[idx]);
      }
      let nr = [];
      for (let k = 0; k < row.length; k++) {
        if (row[k] === row[k+1]) { nr.push(row[k]*2); score += row[k]*2; k++; moved = true; }
        else { nr.push(row[k]); }
      }
      while (nr.length < 4) nr.push(0);
      for (let j = 0; j < 4; j++) {
        let idx = dir === 'L' ? i*4+j : dir === 'R' ? i*4+(3-j) : dir === 'U' ? j*4+i : (3-j)*4+i;
        if (grid[idx] !== nr[j]) moved = true;
        grid[idx] = nr[j];
      }
    }

    if (moved) { moves++; spawn(); updateDOM(); } else { history.pop(); }
    if (score > bestScore) { bestScore = score; localStorage.setItem('2048-elite-best', bestScore); saveGhost(); }
  }

  function undo() {
    if (history.length && undos > 0) {
      let prev = history.pop();
      grid = prev.grid; score = prev.score; moves--; undos--;
      document.getElementById('undo-btn').innerText = `Undo (${undos})`;
      updateDOM();
    }
  }

  function restart() {
    if (confirm("Restart game?")) { grid.fill(0); score = 0; moves = 0; history = []; undos = 3; spawn(); spawn(); updateDOM(); }
  }

  window.addEventListener('keydown', e => {
    if (e.key === 'ArrowUp') move('U'); if (e.key === 'ArrowDown') move('D');
    if (e.key === 'ArrowLeft') move('L'); if (e.key === 'ArrowRight') move('R');
  });

  spawn(); spawn(); updateDOM();
</script>
</body>
</html>
