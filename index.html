<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Custom 2048</title>
  <style>
    body {
      background: #faf8ef;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 5vh;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(4, 80px);
      gap: 10px;
      background: #bbada0;
      padding: 10px;
      border-radius: 8px;
    }
    .tile {
      width: 80px;
      height: 80px;
      background: #cdc1b4;
      border-radius: 4px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 32px;
      font-weight: bold;
      color: #776e65;
    }
    .val-2 { background: #eee4da; }
    .val-4 { background: #ede0c8; }
    .val-8 { background: #f2b179; color: white; }
    .val-16 { background: #f59563; color: white; }
    .val-32 { background: #f67c5f; color: white; }
    .val-64 { background: #f65e3b; color: white; }
  </style>
</head>
<body>

  <h1>My 2048</h1>
  <div id="board"></div>

  <script>
    let board = Array.from({ length: 4 }, () => Array(4).fill(0));
    const boardEl = document.getElementById('board');

    function spawn() {
      let empty = [];
      for (let r = 0; r < 4; r++) {
        for (let c = 0; c < 4; c++) {
          if (board[r][c] === 0) empty.push({ r, c });
        }
      }
      if (empty.length > 0) {
        let { r, c } = empty[Math.floor(Math.random() * empty.length)];
        board[r][c] = Math.random() > 0.1 ? 2 : 4;
      }
    }

    function render() {
      boardEl.innerHTML = '';
      for (let r = 0; r < 4; r++) {
        for (let c = 0; c < 4; c++) {
          let tile = document.createElement('div');
          let val = board[r][c];
          tile.className = `tile ${val > 0 ? 'val-' + val : ''}`;
          tile.textContent = val > 0 ? val : '';
          boardEl.appendChild(tile);
        }
      }
    }

    function slide(row) {
      let arr = row.filter(val => val);
      for (let i = 0; i < arr.length - 1; i++) {
        if (arr[i] === arr[i + 1]) {
          arr[i] *= 2;
          arr[i + 1] = 0;
        }
      }
      arr = arr.filter(val => val);
      while (arr.length < 4) arr.push(0);
      return arr;
    }

    function move(direction) {
      let moved = false;
      for (let i = 0; i < 4; i++) {
        let row = [];
        for (let j = 0; j < 4; j++) {
          if (direction === 'ArrowLeft') row.push(board[i][j]);
          if (direction === 'ArrowRight') row.push(board[i][3 - j]);
          if (direction === 'ArrowUp') row.push(board[j][i]);
          if (direction === 'ArrowDown') row.push(board[3 - j][i]);
        }
        
        let newRow = slide(row);
        
        for (let j = 0; j < 4; j++) {
          let targetR = direction === 'ArrowUp' ? j : direction === 'ArrowDown' ? 3 - j : i;
          let targetC = direction === 'ArrowLeft' ? j : direction === 'ArrowRight' ? 3 - j : i;
          if (board[targetR][targetC] !== newRow[j]) moved = true;
          board[targetR][targetC] = newRow[j];
        }
      }
      if (moved) {
        spawn();
        render();
      }
    }

    window.addEventListener('keydown', (e) => {
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
        e.preventDefault();
        move(e.key);
      }
    });

    spawn();
    spawn();
    render();
  </script>
</body>
</html>
