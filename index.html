<!DOCTYPE html>
<html lang="en" data-theme="cyber">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 // CYBERPUNK_OVERDRIVE</title>
    <style>
        :root {
            --bg: #050505; --panel: #0a0a0f; --grid: #121217; --text: #00f2ff;
            --accent: #00f2ff; --secondary: #ff0055; --acid: #05ffa1; --cols: 10;
        }

        * { box-sizing: border-box; touch-action: none; user-select: none; cursor: crosshair; }
        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Courier New', monospace;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        /* CRT Scanline Effect */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 200; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        #ui-layer {
            display: flex; gap: 20px; padding: 20px; width: 100%; max-width: 1200px;
            z-index: 10; justify-content: center;
        }

        .card {
            background: var(--panel); padding: 15px; border-radius: 0;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); border: 2px solid var(--accent);
            display: flex; flex-direction: column; gap: 10px; position: relative;
        }

        .card::after { content: "SYSTEM_ACTIVE"; position: absolute; bottom: -18px; right: 5px; font-size: 0.6rem; color: var(--secondary); }

        .stat-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { border: 1px solid var(--grid); padding: 8px; text-align: center; }
        .stat-box small { font-size: 0.6rem; color: var(--secondary); text-transform: uppercase; letter-spacing: 2px; }
        .stat-box div { font-weight: bold; font-size: 1.2rem; text-shadow: 0 0 5px var(--accent); }

        #game-view { position: relative; perspective: 1200px; width: min(90vw, 600px); height: min(90vw, 600px); }

        #board {
            position: absolute; inset: 0; background: var(--grid); border: 2px solid var(--grid);
            display: grid; grid-template-columns: repeat(var(--cols), 1fr); gap: 4px;
            padding: 4px; transform-style: preserve-3d; transition: transform 0.1s ease-out;
            box-shadow: 0 0 40px rgba(0,0,0,1);
        }

        .cell { border: 1px solid rgba(0, 242, 255, 0.05); }
        
        .tile {
            position: absolute; width: calc((100% - (var(--cols) + 1) * 4px) / var(--cols));
            height: calc((100% - (var(--cols) + 1) * 4px) / var(--cols));
            display: flex; justify-content: center; align-items: center;
            font-weight: 900; font-size: clamp(0.6rem, 1.5vw, 1.1rem);
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s;
            z-index: 2; border: 1px solid rgba(255,255,255,0.1);
        }

        /* Neon Palette */
        .v-2 { background: rgba(0, 242, 255, 0.05); color: #444; border-color: #222; }
        .v-4 { background: rgba(0, 242, 255, 0.1); color: #666; }
        .v-8 { background: rgba(255, 0, 85, 0.2); color: var(--secondary); border-color: var(--secondary); box-shadow: inset 0 0 10px var(--secondary); }
        .v-16 { background: rgba(255, 0, 85, 0.4); color: #fff; text-shadow: 0 0 5px #fff; }
        .v-32 { background: var(--secondary); color: #fff; box-shadow: 0 0 15px var(--secondary); }
        .v-64 { background: var(--acid); color: #000; box-shadow: 0 0 20px var(--acid); }
        .v-128 { background: #fff; color: #000; box-shadow: 0 0 25px #fff; }

        #particle-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 100; }

        button {
            background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 10px;
            font-family: inherit; font-weight: bold; cursor: pointer; transition: 0.2s;
            clip-path: polygon(0 0, 100% 0, 100% 70%, 90% 100%, 0 100%);
        }
        button:hover { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }

        .glitch { animation: glitch 0.5s infinite; }
        @keyframes glitch {
            0% { transform: translate(0); text-shadow: -2px 0 var(--secondary), 2px 0 var(--accent); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); text-shadow: 2px 0 var(--secondary), -2px 0 var(--accent); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        #achievements { font-size: 0.6rem; color: #444; margin-top: 5px; }
        .earned { color: var(--acid) !important; text-shadow: 0 0 5px var(--acid); }
    </style>
</head>
<body>

<canvas id="particle-canvas"></canvas>

<div id="ui-layer">
    <div class="card">
        <h2 class="glitch" style="margin:0; font-size: 1.2rem; letter-spacing: 4px;">// 2048_OVERDRIVE</h2>
        <div class="stat-group">
            <div class="stat-box"><small>Data_Score</small><div id="score">0</div></div>
            <div class="stat-box"><small>Core_Best</small><div id="best">0</div></div>
        </div>
        <div class="stat-group">
            <button onclick="undo()">REV_STEP</button>
            <button onclick="init()" style="border-color:var(--secondary); color:var(--secondary);">HARD_RST</button>
        </div>
        <div id="achievements">
            STATUS: <br>
            <span id="ach-1">• [SYNC_128_TILE]</span><br>
            <span id="ach-2">• [THOUSAND_MOVES]</span>
        </div>
    </div>
</div>

<div id="game-view">
    <div id="board"></div>
</div>

<script>
    const SIZE = 10;
    const TOTAL = 100;
    let grid = Array(TOTAL).fill(null), score = 0, moves = 0, tileId = 0;
    let history = [], best = localStorage.getItem('2048-cyber-best') || 0;
    
    // --- Industrial Audio Engine ---
    let audioCtx = null;
    const tones = { 'U': 110, 'D': 82.41, 'L': 73.42, 'R': 98.00 }; // Deep Sub Tones
    
    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playSound(freq, type = 'sawtooth', duration = 0.15, vol = 0.05) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        // Add a bit of distortion flavor
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    // --- Particle Burst ---
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    window.onresize();

    function createExplosion(x, y, color) {
        for(let i=0; i<20; i++) {
            particles.push({
                x, y, color,
                w: Math.random() * 8 + 2, h: 2,
                vx: (Math.random() - 0.5) * 15,
                vy: (Math.random() - 0.5) * 15,
                life: 1
            });
        }
    }

    function updateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.03;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, p.w, p.h);
            if(p.life <= 0) particles.splice(i, 1);
        });
        requestAnimationFrame(updateParticles);
    }
    updateParticles();

    // --- Game Logic ---
    function init() {
        grid.fill(null); score = 0; moves = 0;
        document.getElementById('board').innerHTML = '';
        for(let i=0; i<TOTAL; i++) {
            let c = document.createElement('div'); c.className = 'cell';
            document.getElementById('board').appendChild(c);
        }
        spawn(); spawn(); updateDOM();
    }

    function spawn() {
        let empty = grid.map((v, i) => v === null ? i : -1).filter(i => i !== -1);
        if (empty.length) {
            grid[empty[Math.floor(Math.random() * empty.length)]] = { id: tileId++, val: 2 };
        }
    }

    function updateDOM() {
        document.getElementById('score').innerText = score;
        document.getElementById('best').innerText = best;
        const board = document.getElementById('board');
        const gap = 4;
        const tileSize = (board.clientWidth - (SIZE + 1) * gap) / SIZE;

        grid.forEach((t, i) => {
            if (!t) return;
            let el = document.getElementById('t' + t.id);
            if (!el) {
                el = document.createElement('div');
                el.id = 't' + t.id; el.className = 'tile';
                board.appendChild(el);
            }
            el.className = `tile v-${t.val > 128 ? 128 : t.val}`;
            el.innerText = t.val;
            let x = i % SIZE, y = Math.floor(i / SIZE);
            el.style.transform = `translate(${x * (tileSize + gap) + gap}px, ${y * (tileSize + gap) + gap}px)`;
        });

        const ids = new Set(grid.filter(t => t).map(t => 't' + t.id));
        board.querySelectorAll('.tile').forEach(el => { if(!ids.has(el.id)) el.remove(); });
        
        if (score > best) { best = score; localStorage.setItem('2048-cyber-best', best); }
        if (grid.some(t => t && t.val >= 128)) document.getElementById('ach-1').classList.add('earned');
    }

    function move(dir) {
        initAudio();
        playSound(tones[dir], 'sawtooth', 0.1, 0.03);
        
        let moved = false;
        history.push({ grid: JSON.stringify(grid), score });
        if(history.length > 5) history.shift();

        for(let i = 0; i < SIZE; i++) {
            let row = [];
            for(let j = 0; j < SIZE; j++) {
                let idx = dir === 'L' ? i*SIZE+j : dir === 'R' ? i*SIZE+(SIZE-1-j) : dir === 'U' ? j*SIZE+i : (SIZE-1-j)*SIZE+i;
                if(grid[idx]) row.push(grid[idx]);
            }
            let nr = [];
            for(let k = 0; k < row.length; k++) {
                if(row[k+1] && row[k].val === row[k+1].val) {
                    let newVal = row[k].val * 2;
                    nr.push({ id: row[k].id, val: newVal });
                    score += newVal; k++; moved = true;
                    playSound(50 + (newVal), 'square', 0.2, 0.05);
                    const rect = document.getElementById('board').getBoundingClientRect();
                    createExplosion(rect.width/2, rect.height/2, newVal >= 32 ? 'var(--secondary)' : 'var(--accent)');
                } else { nr.push(row[k]); }
            }
            while(nr.length < SIZE) nr.push(null);
            for(let j = 0; j < SIZE; j++) {
                let idx = dir === 'L' ? i*SIZE+j : dir === 'R' ? i*SIZE+(SIZE-1-j) : dir === 'U' ? j*SIZE+i : (SIZE-1-j)*SIZE+i;
                if(JSON.stringify(grid[idx]) !== JSON.stringify(nr[j])) moved = true;
                grid[idx] = nr[j];
            }
        }
        if(moved) { moves++; spawn(); updateDOM(); } else { history.pop(); }
    }

    function undo() {
        if(!history.length) return;
        let last = history.pop();
        grid = JSON.parse(last.grid); score = last.score; updateDOM();
    }

    window.addEventListener('keydown', e => {
        if(e.key === 'ArrowUp') move('U'); if(e.key === 'ArrowDown') move('D');
        if(e.key === 'ArrowLeft') move('L'); if(e.key === 'ArrowRight') move('R');
    });

    document.addEventListener('mousemove', e => {
        let x = (e.clientX / window.innerWidth - 0.5) * 10;
        let y = (e.clientY / window.innerHeight - 0.5) * -10;
        document.getElementById('board').style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
    });

    init();
</script>
</body>
</html>
