<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>2048 Ultimate</title>
<style>
  :root[data-theme="dark"] { --bg: #0f172a; --panel: #1e293b; --grid: #334155; --text: #f8fafc; --accent: #38bdf8; --err: #ef4444; }
  :root[data-theme="light"] { --bg: #faf8ef; --panel: #fff; --grid: #bbada0; --text: #776e65; --accent: #f67c5f; --err: #e53935; }
  
  * { box-sizing: border-box; touch-action: none; user-select: none; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; padding: env(safe-area-inset-top) 20px 20px; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; transition: background 0.3s; }
  
  #layout { display: flex; flex-direction: row; gap: 2vw; max-width: 1000px; width: 100%; perspective: 1000px; }
  @media (max-width: 800px) { #layout { flex-direction: column; align-items: center; } }
  
  .panel { background: var(--panel); padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 380px; transition: 0.3s; }
  h1 { margin: 0 0 10px; color: var(--accent); font-size: 2.5rem; text-transform: uppercase; letter-spacing: -1px; }
  
  .row { display: flex; gap: 10px; margin-bottom: 15px; }
  .box { flex: 1; background: var(--bg); padding: 10px; border-radius: 8px; text-align: center; }
  .box span { display: block; font-size: 0.75rem; opacity: 0.7; text-transform: uppercase; }
  .box strong { font-size: 1.4rem; }
  
  button { flex: 1; background: var(--accent); color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: transform 0.1s, filter 0.2s; }
  button:active { transform: scale(0.95); }
  button.alt { background: var(--grid); color: var(--text); }
  
  #game-wrapper { position: relative; width: min(90vw, 400px); height: min(90vw, 400px); transform-style: preserve-3d; transition: transform 0.1s ease-out; }
  #board { position: absolute; inset: 0; background: var(--grid); border-radius: 16px; padding: 10px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; box-shadow: inset 0 0 20px rgba(0,0,0,0.2); }
  #board.error { animation: shake 0.2s; border: 2px solid var(--err); }
  #board.danger { animation: heartbeat 1s infinite; }
  
  .cell { background: rgba(0,0,0,0.1); border-radius: 8px; }
  .tile { position: absolute; width: calc(25% - 12.5px); height: calc(25% - 12.5px); border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: clamp(1.5rem, 5vw, 2.5rem); font-weight: 800; transition: transform 0.15s cubic-bezier(0.2,0.8,0.2,1); box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 2; }
  .new { animation: pop 0.2s forwards; }
  .merged { animation: pop-merge 0.2s forwards; z-index: 10; }
  
  .v-2{background:#eee4da;color:#000}.v-4{background:#ede0c8;color:#000}.v-8{background:#f2b179;color:#fff}.v-16{background:#f59563;color:#fff}.v-32{background:#f67c5f;color:#fff}.v-64{background:#f65e3b;color:#fff}.v-128{background:#edcf72;color:#000;box-shadow:0 0 15px rgba(237,207,114,0.4)}.v-256,.v-512,.v-1024,.v-2048{background:#edcc61;color:#000;box-shadow:0 0 20px rgba(237,204,97,0.6)}
  
  #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); border-radius: 16px; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 20; text-align: center; }
  #overlay.active { opacity: 1; pointer-events: auto; }
  
  #ai-msg { font-size: 0.9rem; margin-top: 10px; min-height: 40px; color: var(--accent); }
  
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
  @keyframes heartbeat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }
  @keyframes pop { 0%{transform:scale(0)} 100%{transform:scale(1)} }
  @keyframes pop-merge { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
</style>
</head>
<body>

<div id="layout">
  <div class="panel">
    <h1>2048 Pro</h1>
    <div class="row">
      <div class="box"><span>Score</span><strong id="score">0</strong></div>
      <div class="box"><span>Best</span><strong id="best">0</strong></div>
    </div>
    <div class="row">
      <button onclick="undo()">Undo (3)</button>
      <button class="alt" onclick="restart()">Reset</button>
    </div>
    <div class="row">
      <button class="alt" onclick="toggleTheme()">🌓 Theme</button>
      <button class="alt" onclick="toggleMute()" id="mute-btn">🔊 Sound</button>
    </div>
    <hr style="border:1px solid var(--grid); margin:15px 0;">
    <button onclick="aiHint()">🤖 Pro AI Analyst</button>
    <div id="ai-msg">Ready to play. Smooth engine active.</div>
  </div>

  <div id="game-wrapper">
    <div id="board">
      <script>for(let i=0;i<16;i++) document.write('<div class="cell"></div>');</script>
    </div>
    <div id="overlay">
      <h2 style="color:var(--err);font-size:3rem;margin:0">Game Over</h2>
      <p style="color:#fff;margin-bottom:20px">No moves remaining.</p>
      <button onclick="restart()" style="width:80%">Try Again</button>
    </div>
  </div>
</div>

<script>
  let grid = Array(16).fill(null), score = 0, best = localStorage.getItem('2048-best') || 0;
  let undoStack = [], undosLeft = 3, isGameOver = false, isMuted = false, lock = false, tileId = 0;
  
  // Audio Engine with Autoplay Bypass
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let actx = null, audioUnlocked = false;

  function unlockAudio() {
    if (audioUnlocked) return;
    if (!actx) actx = new AudioCtx();
    if (actx.state === 'suspended') actx.resume();
    let osc = actx.createOscillator(), gain = actx.createGain();
    gain.gain.value = 0; 
    osc.connect(gain); gain.connect(actx.destination);
    osc.start(0); osc.stop(actx.currentTime + 0.001);
    audioUnlocked = true;
    ['touchstart', 'keydown', 'mousedown'].forEach(e => document.removeEventListener(e, unlockAudio));
  }
  ['touchstart', 'keydown', 'mousedown'].forEach(e => document.addEventListener(e, unlockAudio, {once:true}));

  function playSound(type, val = 0) {
    if(isMuted || !audioUnlocked) return;
    if(actx.state === 'suspended') actx.resume();
    const osc = actx.createOscillator(), g = actx.createGain();
    osc.connect(g); g.connect(actx.destination);
    
    if(type === 'slide') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(150, actx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(50, actx.currentTime + 0.1);
      g.gain.setValueAtTime(0.1, actx.currentTime);
      g.gain.linearRampToValueAtTime(0.01, actx.currentTime + 0.1);
      osc.start(); osc.stop(actx.currentTime + 0.1);
    } else if(type === 'merge') {
      osc.type = 'triangle'; osc.frequency.setValueAtTime(200 + val, actx.currentTime);
      g.gain.setValueAtTime(0.2, actx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.15);
      osc.start(); osc.stop(actx.currentTime + 0.15);
      if(navigator.vibrate) navigator.vibrate(50);
    } else if(type === 'err') {
      if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
    }
  }

  let seed = new Date().setHours(0,0,0,0);
  function random() { let x = Math.sin(seed++) * 10000; return x - Math.floor(x); }

  function init() {
    document.getElementById('best').innerText = best;
    grid.fill(null); score = 0; undoStack = []; undosLeft = 3; isGameOver = false; lock = false;
    document.getElementById('overlay').classList.remove('active');
    document.getElementById('board').querySelectorAll('.tile').forEach(el => el.remove());
    spawn(); spawn(); updateDOM();
  }

  function spawn() {
    let empty = grid.map((v, i) => v === null ? i : -1).filter(i => i !== -1);
    if(empty.length) grid[empty[Math.floor(random() * empty.length)]] = { id: tileId++, val: random() > 0.1 ? 2 : 4, merged: false };
  }

  function getPos(idx) {
    let x = idx % 4, y = Math.floor(idx / 4);
    return `translate(calc(${x * 100}% + ${x * 10}px), calc(${y * 100}% + ${y * 10}px))`;
  }

  // Engine Fix 1: Object Diffing for real CSS Transitions
  function updateDOM() {
    document.getElementById('score').innerText = score;
    if(score > best) { best = score; localStorage.setItem('2048-best', best); document.getElementById('best').innerText = best; }
    
    let board = document.getElementById('board');
    let currentIds = new Set();
    
    grid.forEach((t, i) => {
      if(!t) return;
      currentIds.add(t.id);
      let el = document.getElementById('t' + t.id);
      
      if(!el) {
        el = document.createElement('div');
        el.id = 't' + t.id;
        el.className = `tile v-${t.val > 2048 ? 2048 : t.val} new`;
        board.appendChild(el);
      } else {
        el.className = `tile v-${t.val > 2048 ? 2048 : t.val} ${t.merged ? 'merged' : ''}`;
      }
      
      el.innerText = t.val;
      el.style.transform = getPos(i);
    });

    board.querySelectorAll('.tile').forEach(el => {
      if(!currentIds.has(parseInt(el.id.substring(1)))) el.remove();
    });

    board.className = grid.filter(t => !t).length <= 2 && !isGameOver ? 'danger' : '';
    checkGameOver();
  }

  function move(dir) {
    if(isGameOver || lock) return;
    lock = true; 
    let oldGrid = grid.map(t => t ? {...t} : null), oldScore = score, moved = false;
    
    grid.forEach(t => t && (t.merged = false)); // Reset merge flags

    for(let i = 0; i < 4; i++) {
      let row = [];
      for(let j = 0; j < 4; j++) {
        let realIdx = dir === 'L' ? i*4+j : dir === 'R' ? i*4+(3-j) : dir === 'U' ? j*4+i : (3-j)*4+i;
        if(grid[realIdx]) row.push(grid[realIdx]);
      }
      
      let newRow = [];
      for(let k = 0; k < row.length; k++) {
        if(row[k+1] && row[k].val === row[k+1].val) {
          newRow.push({ id: row[k].id, val: row[k].val * 2, merged: true });
          score += row[k].val * 2; k++; moved = true;
          playSound('merge', row[k].val * 2);
        } else { 
          newRow.push(row[k]); 
        }
      }
      while(newRow.length < 4) newRow.push(null);
      
      for(let j = 0; j < 4; j++) {
        let realIdx = dir === 'L' ? i*4+j : dir === 'R' ? i*4+(3-j) : dir === 'U' ? j*4+i : (3-j)*4+i;
        if(grid[realIdx] !== newRow[j]) moved = true;
        grid[realIdx] = newRow[j];
      }
    }

    if(moved) {
      if(undoStack.length >= 3) undoStack.shift();
      undoStack.push({g: oldGrid, s: oldScore});
      playSound('slide'); spawn(); updateDOM();
    } else {
      errBump();
    }
    
    setTimeout(() => lock = false, 150); 
  }

  function undo() {
    if(undoStack.length && undosLeft > 0) {
      let state = undoStack.pop(); grid = state.g; score = state.s; undosLeft--;
      event.target.innerText = `Undo (${undosLeft})`; updateDOM();
    }
  }

  function checkGameOver() {
    if(grid.includes(null)) return;
    for(let i=0; i<16; i++) {
      if((i%4<3 && grid[i].val===grid[i+1].val) || (i<12 && grid[i].val===grid[i+4].val)) return;
    }
    isGameOver = true; document.getElementById('overlay').classList.add('active');
  }

  function errBump() {
    let b = document.getElementById('board');
    b.classList.add('error'); playSound('err');
    setTimeout(() => b.classList.remove('error'), 200);
  }

  function restart() { if(confirm("Restart current game?")) init(); }

  // Engine Fix 2: Pro AI with Snake Weight Matrix
  const AI_WEIGHTS = [
    65536, 32768, 16384, 8192,
    512,   1024,  2048,  4096,
    256,   128,   64,    32,
    2,     4,     8,     16
  ];

  function aiHint() {
    if(isGameOver) return;
    let scores = {U:-1, D:-1, L:-1, R:-1};
    
    ['U','D','L','R'].forEach(dir => {
      let sim = grid.map(t => t ? {...t} : null), moved = false;
      for(let i=0;i<4;i++){
        let r=[]; for(let j=0;j<4;j++){let x=dir==='L'?i*4+j:dir==='R'?i*4+(3-j):dir==='U'?j*4+i:(3-j)*4+i; if(sim[x])r.push(sim[x]);}
        let nr=[]; for(let k=0;k<r.length;k++){if(r[k+1]&&r[k].val===r[k+1].val){nr.push({val:r[k].val*2});k++;moved=true;}else nr.push(r[k]);}
        while(nr.length<4) nr.push(null);
        for(let j=0;j<4;j++){let x=dir==='L'?i*4+j:dir==='R'?i*4+(3-j):dir==='U'?j*4+i:(3-j)*4+i; if(sim[x]!==nr[j]) moved=true; sim[x]=nr[j];}
      }
      if(moved) {
        scores[dir] = 0;
        sim.forEach((t, idx) => {
          if(t) scores[dir] += t.val * AI_WEIGHTS[idx];
          else scores[dir] += 100000; // Big bonus for empty slots
        });
      }
    });
    
    let best = Object.keys(scores).reduce((a,b) => scores[a]>scores[b]?a:b);
    document.getElementById('ai-msg').innerHTML = scores[best] === -1 ? "Board locked." : `Optimal strategy: Swipe <strong>${best === 'U'?'UP':best==='D'?'DOWN':best==='L'?'LEFT':'RIGHT'}</strong>`;
  }

  function toggleTheme() {
    let t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', t);
  }
  function toggleMute() { isMuted = !isMuted; document.getElementById('mute-btn').innerText = isMuted ? '🔇 Muted' : '🔊 Sound'; }

  window.addEventListener('keydown', e => {
    let k = e.key.toLowerCase(); 
    if(['arrowup','w'].includes(k)) { e.preventDefault(); move('U'); }
    if(['arrowdown','s'].includes(k)) { e.preventDefault(); move('D'); }
    if(['arrowleft','a'].includes(k)) { e.preventDefault(); move('L'); }
    if(['arrowright','d'].includes(k)) { e.preventDefault(); move('R'); }
  });

  let tx, ty, time;
  document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; time = Date.now(); });
  document.addEventListener('touchend', e => {
    if(!tx||!ty) return;
    let dx = e.changedTouches[0].clientX - tx, dy = e.changedTouches[0].clientY - ty;
    let v = Math.max(Math.abs(dx), Math.abs(dy)) / (Date.now() - time);
    if(v > 0.5 || Math.max(Math.abs(dx), Math.abs(dy)) > 40) { 
      if(Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'R' : 'L'); else move(dy > 0 ? 'D' : 'U');
    }
    tx=ty=null;
  });

  document.addEventListener('mousemove', e => {
    let rx = (e.clientY / window.innerHeight - 0.5) * -10, ry = (e.clientX / window.innerWidth - 0.5) * 10;
    document.getElementById('game-wrapper').style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
  });

  init();
</script>
</body>
</html>
